#
# Builds + publishes the SelfHelp Manager image on a version tag, with an SBOM
# and a dependency license report attached as release artifacts. Image signing
# (cosign) is wired but only runs when COSIGN_PRIVATE_KEY is configured.
name: manager-release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  packages: write
  id-token: write
  # Required by github/codeql-action/upload-sarif to push the Trivy scan into
  # the repo's code-scanning view; without it the upload fails with
  # "Resource not accessible by integration" and kills the tag release.
  security-events: write

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  release:
    runs-on: ubuntu-latest
    # Mapped to a job-scoped env so the optional cosign step's `if:` can read it
    # (the `secrets` context is not available in step `if:` expressions).
    env:
      COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
      NOTIFICATION_EMAIL: ${{ secrets.NOTIFICATION_EMAIL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Quality gate
        run: npm run check
      - name: Release smoke (install + update + multi-instance isolation)
        run: npm run smoke
      - name: License report
        run: npm run license:report | tee license-report.txt

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # A dedicated BuildKit (docker-container) builder makes buildx push the
      # image to GHCR directly. Without it buildx falls back to the runner's
      # default docker driver, which exports the image into the local daemon
      # and lets the daemon push — and that daemon-side push intermittently
      # fails against GHCR with "ERROR: unknown blob" after all layers have
      # uploaded (this killed the v1.0.8 release).
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          # Keep the pushed artifact a plain image manifest rather than an OCI
          # index with a provenance attestation, so the digest stays the image
          # digest previous releases shipped — it is what cosign signs below
          # and what operators pin.
          provenance: false
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.ref_name }}

      - name: Generate SBOM (SPDX)
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.IMAGE }}:${{ github.ref_name }}
          format: spdx-json
          output-file: sbom.spdx.json

      # SHA-pinned to the 0.35.0 immutable release — the only tag guaranteed
      # safe after the March 2026 Trivy supply-chain compromise
      # (GHSA-69fq-xp46-6x23). Older tags (incl. the previous 0.28.0 pin) were
      # force-pushed to malicious commits and later deleted, which made this
      # workflow fail with "unable to find version 0.28.0"; never pin this
      # action by mutable tag.
      - name: Scan image for vulnerabilities (Trivy)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          image-ref: ${{ env.IMAGE }}:${{ github.ref_name }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          # Advisory: attach results to the release; do not block a tagged
          # release on a freshly disclosed base-image CVE.
          exit-code: '0'

      - name: Upload Trivy results to code scanning
        if: ${{ always() && hashFiles('trivy-results.sarif') != '' }}
        # Advisory by design: the SARIF still ships as a release artifact, so
        # a code-scanning hiccup must never block a tagged release.
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif

      - name: Sign image (optional)
        if: ${{ env.COSIGN_PRIVATE_KEY != '' }}
        env:
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
        run: |
          curl -sSfL https://github.com/sigstore/cosign/releases/latest/download/cosign-linux-amd64 -o /usr/local/bin/cosign
          chmod +x /usr/local/bin/cosign
          cosign sign --yes --key env://COSIGN_PRIVATE_KEY "${IMAGE}@${{ steps.build.outputs.digest }}"

      - name: Attach artifacts to the release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            sbom.spdx.json
            trivy-results.sarif
            license-report.txt

      # Best-effort: the release is already published by now, so a mail/SMTP
      # hiccup must never mark the release run as failed. Only runs when the
      # NOTIFICATION_EMAIL secret (and the MAIL_* SMTP secrets) are configured.
      - name: Send release notification email
        if: ${{ env.NOTIFICATION_EMAIL != '' }}
        continue-on-error: true
        uses: dawidd6/action-send-mail@v4
        with:
          server_address: ${{ secrets.MAIL_SERVER }}
          server_port: ${{ secrets.MAIL_PORT }}
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: SelfHelp Manager ${{ github.ref_name }} released
          to: ${{ secrets.NOTIFICATION_EMAIL }}
          from: SelfHelp Manager CI
          body: |
            SelfHelp Manager version ${{ github.ref_name }} has been released.

            Release: ${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ github.ref_name }}
            Commit: ${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}
